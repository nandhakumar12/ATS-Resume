services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ats-backend
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - DDB_USERS_TABLE=${DDB_USERS_TABLE:-ats_users}
      - DDB_RESUMES_TABLE=${DDB_RESUMES_TABLE:-ats_resumes}
      - DDB_JOBS_TABLE=${DDB_JOBS_TABLE:-ats_jobs}
    networks:
      - ats-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ats-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=/api
    depends_on:
      - backend
    networks:
      - ats-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ats-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ats-network
    restart: unless-stopped

networks:
  ats-network:
    driver: bridge
